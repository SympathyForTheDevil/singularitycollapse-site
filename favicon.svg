    <circle r="23" fill="none" stroke="#ffb03c" stroke-opacity="0.4" stroke-width="2"/>
    <circle r="19" fill="none" stroke="#ff7a18" stroke-width="4.5"/>
  </g>
  <circle cx="32" cy="32" r="14.5" fill="#000"/>
  <circle cx="32" cy="32" r="14.5" fill="none" stroke="#c060ff" stroke-width="2.8"/>
  <circle cx="32" cy="32" r="14.5" fill="none" stroke="#e6c0ff" stroke-width="1"/>
