<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="42%" stop-color="#bb55ff" stop-opacity="0"/>
      <stop offset="62%" stop-color="#be5aff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7828c8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#05060c"/>
  <circle cx="32" cy="32" r="29" fill="url(#halo)"/>
